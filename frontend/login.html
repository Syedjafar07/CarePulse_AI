<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - CarePulse AI</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; }
.auth-wrapper {
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 20px;
    background: linear-gradient(135deg, #fff 0%, #ffe5e5 100%);
}
.auth-card {
    background: #fff; border-radius: 20px; padding: 44px 36px;
    width: 100%; max-width: 420px;
    box-shadow: 0 8px 40px rgba(220,38,38,0.12);
}
.auth-logo { text-align: center; margin-bottom: 30px; }
.auth-logo img { height: 52px; }
.auth-logo h2 { color: #dc2626; font-size: 24px; margin-top: 10px; font-weight: 800; }
.auth-logo p { color: #888; font-size: 13px; margin-top: 4px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
input {
    width: 100%; padding: 12px 16px; border: 1.5px solid #e5e7eb;
    border-radius: 10px; font-size: 14px; color: #333;
    transition: border 0.2s; outline: none; background: #fafafa;
}
input:focus { border-color: #dc2626; background: #fff; }
.btn-login {
    width: 100%; background: #dc2626; color: white;
    border: none; padding: 14px; border-radius: 12px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    margin-top: 8px; transition: background 0.2s;
}
.btn-login:hover { background: #b91c1c; }
.register-link { text-align: center; margin-top: 16px; font-size: 13px; color: #666; }
.register-link a { color: #dc2626; font-weight: 600; text-decoration: none; }
.divider { text-align: center; color: #ccc; margin: 16px 0; font-size: 12px; }
.quote {
    background: #fef2f2; border-radius: 10px; padding: 12px 16px;
    text-align: center; margin-bottom: 24px;
    font-size: 13px; color: #dc2626; font-style: italic;
}
.tab-row { display: flex; gap: 8px; margin-bottom: 20px; }
.tab-btn {
    flex: 1; padding: 10px; border: 1.5px solid #e5e7eb;
    border-radius: 10px; background: #fafafa; color: #666;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
}
.tab-btn.active { background: #dc2626; color: white; border-color: #dc2626; }
</style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="assets/logo.png" alt="CarePulse AI" onerror="this.style.display='none'"/>
      <h2>🩸 CarePulse AI</h2>
      <p>Connecting Donors. Supporting Lives.</p>
    </div>

    <div class="quote">"Every blood donor is someone's hero." 💉</div>

    <div class="tab-row">
      <button class="tab-btn active" id="tab-email" onclick="switchTab('email')">📧 Email Login</button>
      <button class="tab-btn" id="tab-phone" onclick="switchTab('phone')">📱 Phone Login</button>
    </div>

    <div id="section-email">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@email.com"
               onkeydown="if(event.key==='Enter') login()"/>
      </div>
    </div>

    <div id="section-phone" style="display:none">
      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" id="phone" placeholder="+91XXXXXXXXXX"
               onkeydown="if(event.key==='Enter') login()"/>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password"
             onkeydown="if(event.key==='Enter') login()"/>
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">Login →</button>

    <div class="divider">— or —</div>
    <div class="register-link">
      New to CarePulse AI? <a href="register.html">Create Account</a>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
