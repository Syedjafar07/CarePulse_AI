<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarePulse AI — Nearby Hospitals</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/logo.png">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="assets/logo.png" alt="CarePulse AI">
    <span class="sidebar-logo-text">Care<span>Pulse</span></span>
  </div>
  <nav class="sidebar-nav">
    <button class="nav-item" onclick="location.href='dashboard.html'"><span class="nav-icon">🏠</span> Dashboard</button>
    <button class="nav-item" onclick="location.href='request.html'"><span class="nav-icon">🩸</span> Blood Requests</button>
    <button class="nav-item" onclick="location.href='donor-portal.html'"><span class="nav-icon">👥</span> Donor Portal</button>
    <button class="nav-item active" onclick="location.href='hospitals.html'"><span class="nav-icon">🏥</span> Hospitals</button>
    <button class="nav-item" onclick="location.href='symptom.html'"><span class="nav-icon">🤖</span> AI Symptom Checker</button>
    <button class="nav-item" onclick="location.href='profile.html'"><span class="nav-icon">👤</span> Profile</button>
    <button class="nav-item" onclick="logout()"><span class="nav-icon">🚪</span> Logout</button>
  </nav>
  <div class="sidebar-donate-card">
    <h4>🏥 Find Help Fast</h4>
    <p>Locate nearest hospitals and blood banks instantly.</p>
    <button class="sidebar-donate-btn" onclick="loadHospitals()">Refresh →</button>
  </div>
</aside>

<div class="main-content">
  <div class="topbar">
    <div class="topbar-left">
      <h2>Location Services</h2>
      <h3>Nearby Hospitals 🏥</h3>
    </div>
    <div class="topbar-right">
      <button class="topbar-location">📍 <span id="location-text">Detecting...</span></button>
      <div class="topbar-user" onclick="location.href='profile.html'">
        <div class="topbar-avatar" id="user-avatar">?</div>
      </div>
    </div>
  </div>

  <div class="dashboard-body">
    <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:20px;">

      <!-- HOSPITAL LIST -->
      <div>
        <div class="dash-card">
          <div class="dash-card-header">
            <span class="dash-card-title">🏥 Hospitals Near You</span>
            <span class="dash-card-link" onclick="loadHospitals()">Refresh</span>
          </div>
          <div id="hospital-list">
            <div style="text-align:center;padding:40px;color:var(--gray-400);">
              <div class="spinner" style="margin:0 auto 12px;"></div>
              Detecting your location...
            </div>
          </div>
        </div>
      </div>

      <!-- MAP -->
      <div>
        <div class="dash-card" style="height:100%;">
          <div class="dash-card-header">
            <span class="dash-card-title">🗺️ Map View</span>
          </div>
          <div id="map" style="width:100%;height:450px;border-radius:12px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;">
            <div style="text-align:center;color:var(--gray-400);">
              <div style="font-size:48px;margin-bottom:12px;">🗺️</div>
              <p>Map loading...</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bnav-item" onclick="location.href='dashboard.html'"><span class="bicon">🏠</span>Home</button>
    <button class="bnav-item" onclick="location.href='donor-portal.html'"><span class="bicon">👥</span>Donors</button>
    <button class="bnav-item bnav-sos" onclick="location.href='request.html'"><span class="bicon">🩸</span></button>
    <button class="bnav-item active" onclick="location.href='hospitals.html'"><span class="bicon">🏥</span>Hospitals</button>
    <button class="bnav-item" onclick="location.href='profile.html'"><span class="bicon">👤</span>Profile</button>
  </div>
</nav>

<script src="js/app.js"></script>
<script>
let map, userLat, userLng;

document.addEventListener("DOMContentLoaded", async () => {
  requireAuth();
  const user = getUser();
  if (user && user.name) document.getElementById("user-avatar").textContent = user.name[0].toUpperCase();
  try {
    const pos = await getUserLocation();
    userLat = pos.lat; userLng = pos.lng;
    const addr = await reverseGeocode(pos.lat, pos.lng);
    document.getElementById("location-text").textContent = addr.split(",").slice(0,2).join(",");
    loadHospitals();
    initMap(pos.lat, pos.lng);
  } catch {
    document.getElementById("location-text").textContent = "Location unavailable";
    document.getElementById("hospital-list").innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray-400);">📍 Please enable location access to see nearby hospitals.</div>';
  }
});

async function loadHospitals() {
  if (!userLat || !userLng) return;
  const container = document.getElementById("hospital-list");
  container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--gray-400);"><div class="spinner" style="margin:0 auto 12px;"></div>Finding hospitals...</div>';
  const { ok, data } = await apiCall(`/ai/hospitals?lat=${userLat}&lng=${userLng}`);
  if (!ok || !data.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray-400);">No hospitals found nearby.</div>';
    return;
  }
  container.innerHTML = data.map((h, i) => {
    const dist = calcDist(userLat, userLng, h.lat, h.lng);
    return `
    <div style="border:1.5px solid var(--gray-200);border-radius:10px;padding:14px;margin-bottom:12px;transition:var(--transition);cursor:pointer;" onclick="focusHospital(${h.lat},${h.lng},'${h.name}')" onmouseover="this.style.borderColor='var(--red)'" onmouseout="this.style.borderColor='var(--gray-200)'">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:48px;height:48px;border-radius:10px;background:var(--red-pale);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">🏥</div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:600;color:var(--dark);">${h.name}</div>
          <div style="font-size:12px;color:var(--gray-400);margin-top:2px;">${h.address}</div>
          <div style="font-size:11px;margin-top:4px;display:flex;align-items:center;gap:8px;">
            <span style="color:${h.open_now ? 'var(--green)' : 'var(--red)'};font-weight:600;">${h.open_now ? '● Open' : '● Closed'}</span>
            <span style="color:var(--gray-400);">· ${dist} km away</span>
            ${h.rating !== 'N/A' ? `<span style="color:var(--yellow);">★ ${h.rating}</span>` : ''}
          </div>
        </div>
        <button onclick="event.stopPropagation();window.open('https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lng}','_blank')" style="width:36px;height:36px;border-radius:50%;background:var(--green);color:white;border:none;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;">📞</button>
      </div>
    </div>`;
  }).join("");
}

function calcDist(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dL = (lat2-lat1)*Math.PI/180;
  const dN = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dL/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dN/2)**2;
  return (R*2*Math.asin(Math.sqrt(a))).toFixed(1);
}

function initMap(lat, lng) {
  document.getElementById("map").innerHTML = `
    <iframe
      width="100%" height="100%"
      style="border:none;border-radius:12px;"
      src="https://maps.google.com/maps?q=hospitals+near+${lat},${lng}&output=embed"
      allowfullscreen allow="geolocation">
    </iframe>`;
}

function focusHospital(lat, lng, name) {
  document.getElementById("map").innerHTML = `
    <iframe
      width="100%" height="100%"
      style="border:none;border-radius:12px;"
      src="https://maps.google.com/maps?q=${encodeURIComponent(name)}&output=embed"
      allowfullscreen allow="geolocation">
    </iframe>`;
}
</script>
</body>
</html>
